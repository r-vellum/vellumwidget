# The vellumwidget runtime is TypeScript in `srcts/`, bundled by esbuild into the
# committed `inst/htmlwidgets/vellumwidget.js` (so the R package installs with no Node).
# This workflow guards that bundle: it type-checks the source, rebuilds the
# bundle and fails if the committed copy is stale, and runs the headless
# behaviour suite (jsdom). It needs neither R nor Rust, so it runs once as its
# own job rather than riding the R-CMD-check matrix.
on:
  # Auto-triggers (push / pull_request, path-filtered to srcts/ and the bundle)
  # removed to conserve GitHub Actions minutes — run this manually from the
  # Actions tab (workflow_dispatch), or re-add push/pull_request when ready.
  workflow_dispatch:

name: js.yaml

permissions: read-all

jobs:
  js:
    runs-on: ubuntu-latest
    name: js-runtime

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dev dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npx tsc --noEmit

      # Rebuild the bundle and fail if the committed copy is out of sync with
      # srcts/ — the committed vellumwidget.js is generated, never hand-edited.
      - name: Rebuild bundle
        run: node esbuild.js

      - name: Verify committed bundle is in sync
        run: |
          if ! git diff --quiet -- inst/htmlwidgets/vellumwidget.js; then
            echo "::error::inst/htmlwidgets/vellumwidget.js is stale. Run 'npm run build' and commit the result."
            git diff -- inst/htmlwidgets/vellumwidget.js
            exit 1
          fi

      - name: Headless behaviour suite
        run: node tests/js/behavior.test.js
