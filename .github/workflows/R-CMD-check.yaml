# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# `vellumwidget` builds on `vellum`, whose backend is Rust (extendr). The extra
# `setup-rust-toolchain` step provides the compiler that building `vellum` from
# source (via the `Remotes:` entry in DESCRIPTION) needs; everything else is the
# standard r-lib R-CMD-check flow.
on:
  push:
    branches: [main]
  pull_request:
  # Nightly cross-layer check kept off for now; restore before release. vellum
  # and vellumwidget are version-locked and co-released, so a nightly catches a
  # break in vellum's main before it bricks a release.
  # schedule:
  #   - cron: "0 4 * * *"
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          # Trimmed to a single Linux job to conserve Actions minutes. The full
          # matrix (macOS + R devel/release/oldrel-1) lived here — macOS bills at
          # 10x, so it was the dominant cost. Restore before release.
          - {os: ubuntu-latest,  r: 'release'}
          # Windows is deferred: `vellum`'s Rust toolchain needs the GNU target
          # wired to Rtools, which is finicky on CI. Add once that is proven.

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      # Rust compiler for building `vellum` (SystemRequirements: Cargo, rustc).
      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
