url: https://r-vellum.github.io/vellumwidget/

template:
  bootstrap: 5
  math-rendering: mathjax
  bslib:
    # A parchment / sepia palette echoing the vellum & vellumplot hex logos.
    bg: "#faf5ea"
    fg: "#2c2113"
    primary: "#6b4f2c"
    secondary: "#8a7350"
    border-radius: "0.5rem"
    navbar-bg: "#efe6d2"
    navbar-light-brand-color: "#4a371f"
    link-color: "#7a5320"
    code-bg: "#f2e9d6"
    base_font: {google: "Spectral"}
    heading_font: {google: "Spectral SC"}
    code_font: {google: "JetBrains Mono"}
  includes:
    in_header: |
      <meta name="theme-color" content="#efe6d2">
  opengraph:
    twitter:
      creator: "@schochastics"
      card: summary_large_image

home:
  title: Interactive web widgets for vellum scenes
  description: >
    vellumwidget turns a vellum scene (or a vellumplot plot) into a self-contained,
    client-side interactive HTML widget -- hover, select, brush, pan/zoom, and
    linked views -- with no Shiny and no server round-trip.
  sidebar:
    structure: [ecosystem, links, license, community, citation, authors, dev]
    components:
      ecosystem:
        title: The ecosystem
        text: >
          [vellum](https://r-vellum.github.io/vellum/) · the parchment
          (backend)<br>
          [vellumplot](https://r-vellum.github.io/vellumplot/) · the pen (grammar)<br>
          [vellumwidget](https://r-vellum.github.io/vellumwidget/) · the annotation (interactivity)<br>
          [vellumverse](https://r-vellum.github.io/vellumverse/) · loads
          them together

navbar:
  structure:
    left: [articles, gallery, reference, news]
    right: [search, vellum, vellumplot, vellumverse, github]
  components:
    gallery:
      text: Gallery
      href: https://r-vellum.github.io/vellumgallery/
    vellum:
      icon: fa-scroll
      href: https://r-vellum.github.io/vellum/
      aria-label: vellum
    vellumplot:
      icon: fa-feather-pointed
      href: https://r-vellum.github.io/vellumplot/
      aria-label: vellumplot
    vellumverse:
      icon: fa-book
      href: https://r-vellum.github.io/vellumverse/
      aria-label: vellumverse
    github:
      icon: fa-github
      href: https://github.com/r-vellum/vellumwidget
      aria-label: GitHub

articles:
- title: Articles
  navbar: ~
  contents:
  - articles/interactivity
  - articles/shiny

reference:
- title: Building a widget
  desc: >
    Compile a `vellumplot` plot or a raw `vellum` scene into a self-contained,
    client-side interactive HTML widget.
  contents:
  - as_widget

- title: Shiny
  desc: Output and render bindings for embedding a vellumwidget widget in a Shiny app.
  contents:
  - vellumwidgetOutput

- title: Package
  contents:
  - vellumwidget-package

footer:
  structure:
    left: developed_by
    right: built_with
